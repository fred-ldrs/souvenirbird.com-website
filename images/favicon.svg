<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Favicon - Simple bird icon -->
  <rect width="512" height="512" rx="80" fill="#7EC4A8"/>
  
  <!-- Bird silhouette -->
  <!-- Body -->
  <ellipse cx="256" cy="290" rx="90" ry="100" fill="#FFFFFF"/>
  
  <!-- Head -->
  <circle cx="256" cy="200" r="60" fill="#FFFFFF"/>
  
  <!-- Wing -->
  <ellipse cx="210" cy="295" rx="45" ry="65" fill="#B8E6D5" transform="rotate(-20 210 295)"/>
  
  <!-- Beak -->
  <path d="M 256 200 L 300 207 L 256 214 Z" fill="#F4A460"/>
  
  <!-- Eye -->
  <circle cx="270" cy="193" r="8" fill="#2C3E50"/>
</svg>
