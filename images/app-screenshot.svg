<svg width="1000" height="2000" viewBox="0 0 1000 2000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Placeholder for app screenshot -->
  <rect width="1000" height="2000" fill="#F5FDFB"/>
  
  <!-- Phone mockup -->
  <rect x="50" y="100" width="900" height="1800" rx="60" fill="#FFFFFF" stroke="#E8ECEF" stroke-width="2"/>
  
  <!-- Status bar -->
  <rect x="50" y="100" width="900" height="80" rx="60" fill="#7EC4A8"/>
  
  <!-- App header -->
  <rect x="100" y="220" width="800" height="100" rx="20" fill="#B8E6D5"/>
  <text x="500" y="280" font-family="Arial, sans-serif" font-size="36" fill="#2C3E50" text-anchor="middle" font-weight="600">SouvenirBird</text>
  
  <!-- Memory card -->
  <rect x="100" y="380" width="800" height="500" rx="20" fill="#FFFFFF" stroke="#E8ECEF" stroke-width="2"/>
  <rect x="140" y="420" width="720" height="300" rx="10" fill="#F5FDFB"/>
  <text x="500" y="780" font-family="Arial, sans-serif" font-size="28" fill="#5A6C7D" text-anchor="middle">Today's memory...</text>
  
  <!-- Date -->
  <text x="500" y="980" font-family="Arial, sans-serif" font-size="24" fill="#7EC4A8" text-anchor="middle">March 9, 2026</text>
  
  <!-- Button -->
  <rect x="300" y="1100" width="400" height="80" rx="40" fill="#7EC4A8"/>
  <text x="500" y="1150" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" text-anchor="middle" font-weight="600">Add Memory</text>
  
  <!-- Bottom nav -->
  <rect x="50" y="1820" width="900" height="80" rx="0" fill="#FFFFFF" stroke="#E8ECEF" stroke-width="2"/>
  
  <!-- Placeholder text -->
  <text x="500" y="1550" font-family="Arial, sans-serif" font-size="32" fill="#B8E6D5" text-anchor="middle" opacity="0.5">App Screenshot Placeholder</text>
</svg>
